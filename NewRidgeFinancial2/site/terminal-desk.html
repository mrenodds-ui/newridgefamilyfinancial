<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NR2 · Terminal · Multi-desk</title>
  <style>
    :root {
      --bg:#0b0d10; --panel:#12161c; --panel-2:#171c24; --line:#2a3340;
      --text:#e6edf5; --muted:#8b97a8; --amber:#f5a623; --amber-dim:rgba(245,166,35,.15);
      --green:#3dd68c; --red:#ff5c5c; --blue:#4da3ff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font:12px/1.35 ui-sans-serif, system-ui, Segoe UI, sans-serif}
    .app{height:100vh;display:grid;grid-template-rows:36px 28px 1fr 32px;grid-template-columns:56px 1fr 320px;gap:1px;background:var(--line)}
    .brand,.ticker,.nav,.stage,.side,.cmd{background:var(--bg);min-height:0;min-width:0;overflow:hidden}
    .brand{grid-column:1;grid-row:1;display:flex;align-items:center;justify-content:center;color:var(--amber);font-weight:700;letter-spacing:.08em;font-size:11px}
    .ticker{grid-column:2/-1;grid-row:1;display:flex;align-items:center;gap:14px;padding:0 12px;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:11px;white-space:nowrap;background:linear-gradient(90deg,#0d1014,#12161c 40%,#0d1014)}
    .ticker b{color:var(--amber);font-weight:600;margin-right:6px}
    .up{color:var(--green)}.dn{color:var(--red)}.flat{color:var(--muted)}.blocked{color:var(--amber)}
    .tabs{grid-column:2/-1;grid-row:2;display:flex;align-items:stretch;background:var(--panel)}
    .tabs a,.tabs button{border:0;background:transparent;color:var(--muted);font:600 11px/1 ui-sans-serif, system-ui, sans-serif;letter-spacing:.06em;text-transform:uppercase;padding:0 14px;cursor:pointer;border-right:1px solid var(--line);text-decoration:none;display:flex;align-items:center}
    .tabs .active{color:#111;background:var(--amber)}
    .tabs .spacer{flex:1}
    .tabs .clock{display:flex;align-items:center;padding:0 12px;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;color:var(--muted)}
    .nav{grid-column:1;grid-row:2/4;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;background:var(--panel)}
    .nav button{width:42px;height:42px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;font:700 9px/1.1 ui-sans-serif, system-ui, sans-serif}
    .nav button.active{color:var(--amber);border-color:var(--line);background:var(--amber-dim)}
    .stage{grid-column:2;grid-row:3;display:grid;gap:1px;background:var(--line);min-height:0}
    .stage[data-layout="3x3"]{grid-template-columns:1.15fr 1fr .95fr;grid-template-rows:1.05fr .95fr .9fr}
    .stage[data-layout="2x3"]{grid-template-columns:1.2fr 1fr;grid-template-rows:1fr 1fr 1fr}
    .pane{background:var(--panel);display:grid;grid-template-rows:28px 1fr;min-height:0;cursor:pointer;outline:1px solid transparent;transition:outline-color .15s,box-shadow .15s}
    .pane:hover{outline-color:rgba(245,166,35,.35)}
    .pane.is-focus{outline-color:var(--amber);box-shadow:inset 0 0 0 1px var(--amber)}
    .pane.is-flash{animation:flash .7s ease}
    @keyframes flash{0%,100%{box-shadow:inset 0 0 0 0 transparent}40%{box-shadow:inset 0 0 0 2px var(--amber)}}
    .pane.wide{grid-column:1/-1}
    .pane.span2{grid-column:span 2}
    .ph{display:flex;align-items:center;justify-content:space-between;padding:0 10px;border-bottom:1px solid var(--line);background:var(--panel-2);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
    .ph .val{color:var(--text);font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;letter-spacing:0;text-transform:none}
    .pb{padding:8px 10px;min-height:0;display:flex;flex-direction:column;gap:6px}
    .kpis{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1}
    .kpi{background:var(--bg);border:1px solid var(--line);padding:8px}
    .kpi .l{color:var(--muted);font-size:10px;letter-spacing:.05em;text-transform:uppercase}
    .kpi .n{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:18px;font-weight:600;margin-top:4px}
    .kpi .s{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:10px;margin-top:2px}
    svg.chart{width:100%;height:100%;display:block;flex:1;min-height:0}
    .bars{display:flex;align-items:flex-end;gap:5px;flex:1;min-height:0;padding-top:4px}
    .bars i{flex:1;display:block;background:linear-gradient(180deg,var(--amber),#9a6410);border:1px solid rgba(245,166,35,.35);min-height:4px}
    .bars i.alt{background:linear-gradient(180deg,var(--blue),#1d4f8c);border-color:rgba(77,163,255,.35)}
    .bars i.mute{background:#2a3340;border-color:#3a4556}
    table.dense{width:100%;border-collapse:collapse;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:11px}
    table.dense th{color:var(--muted);font-weight:500;text-align:left;padding:3px 4px;border-bottom:1px solid var(--line)}
    table.dense td{padding:3px 4px;border-bottom:1px solid rgba(42,51,64,.6)}
    .side{grid-column:3;grid-row:3;display:grid;grid-template-rows:1fr 1fr;gap:1px;background:var(--line)}
    .heat{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;flex:1;align-content:center}
    .heat b{display:block;height:22px;background:#1a222d;border:1px solid var(--line);font:600 9px/22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;text-align:center;color:var(--muted)}
    .heat b.g1{background:rgba(61,214,140,.15);color:var(--green)}
    .heat b.g2{background:rgba(61,214,140,.28);color:var(--green)}
    .heat b.r1{background:rgba(255,92,92,.18);color:var(--red)}
    .heat b.r2{background:rgba(255,92,92,.32);color:var(--red)}
    .list{flex:1;overflow:hidden;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:11px;color:var(--muted)}
    .list div{padding:5px 0;border-bottom:1px solid rgba(42,51,64,.55)}
    .cmd{grid-column:1/-1;grid-row:4;display:grid;grid-template-columns:170px 1fr auto auto;align-items:center;gap:8px;padding:0 10px;background:#0e1217;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
    .cmd .tag{color:var(--amber);font-weight:600;letter-spacing:.06em}
    .cmd input{width:100%;background:transparent;border:0;outline:none;color:var(--text);font:inherit}
    .cmd .status{color:var(--muted);font-size:11px}
    .cmd button{background:var(--amber);color:#111;border:0;font:700 11px ui-sans-serif, system-ui, sans-serif;letter-spacing:.06em;padding:6px 12px;cursor:pointer}
    .cmd button:disabled{opacity:.5;cursor:wait}
    .legend{display:flex;gap:10px;color:var(--muted);font-size:10px;flex-wrap:wrap}
    .hal-print{flex:1;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:11px;color:var(--muted);line-height:1.4;overflow:hidden}
    .hal-print .who{color:var(--amber);margin-bottom:6px}
    .toast{position:fixed;right:12px;bottom:40px;z-index:9;background:rgba(0,0,0,.85);border:1px solid var(--amber);color:var(--text);padding:8px 12px;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;font-size:11px;max-width:360px;display:none}
    .toast.show{display:block}
    .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px;box-shadow:0 0 6px var(--green)}
    .live-dot.off{background:var(--red);box-shadow:0 0 6px var(--red)}
    .note{color:var(--muted);font-size:11px;line-height:1.4}
  </style>
</head>
<body>
  <div class="app">
    <div class="brand">NR2</div>
    <div class="ticker" id="ticker"></div>

    <div class="tabs" id="tabs">
      <button type="button" data-desk="practice">Practice</button>
      <button type="button" data-desk="close">Close</button>
      <button type="button" data-desk="claims">Claims</button>
      <button type="button" data-desk="ar">A/R</button>
      <button type="button" data-desk="trust">Trust</button>
      <div class="spacer"></div>
      <div class="clock" id="clock">—</div>
    </div>

    <nav class="nav" id="nav">
      <button type="button" data-desk="practice">PRAC</button>
      <button type="button" data-desk="close">CLOSE</button>
      <button type="button" data-desk="claims">CLM</button>
      <button type="button" data-desk="ar">AR</button>
      <button type="button" data-desk="trust">TRUST</button>
    </nav>

    <section class="stage" id="stage" data-layout="3x3"></section>

    <aside class="side">
      <div class="pane" data-pane="desk-meta" data-widget="hal-program-posture" data-page="hal">
        <div class="ph"><span>Desk · posture</span><span class="val" id="postureVal">…</span></div>
        <div class="pb">
          <div class="kpis">
            <div class="kpi"><div class="l">Imports</div><div class="n" id="kpiImp">—</div><div class="s" id="kpiImpS">—</div></div>
            <div class="kpi"><div class="l">Page</div><div class="n flat" id="kpiDesk">—</div><div class="s" id="kpiDeskS">hash route</div></div>
            <div class="kpi"><div class="l">Board</div><div class="n up">ON</div><div class="s">actions live</div></div>
            <div class="kpi"><div class="l">Sync</div><div class="n blocked">RUN</div><div class="s">HAL&gt; sync</div></div>
          </div>
        </div>
      </div>
      <div class="pane" data-pane="hal" data-widget="hal-ask" data-page="hal">
        <div class="ph"><span>HAL · last print</span><span class="val" id="halMode">…</span></div>
        <div class="pb">
          <div class="hal-print" id="halPrint"><div class="who">HAL // DESK</div>Booting multi-desk terminal…</div>
          <div class="legend"><span id="halTools">Tools …</span><span id="halHubLbl">Hub …</span><span class="blocked">Invent $ OFF</span></div>
        </div>
      </div>
    </aside>

    <form class="cmd" id="cmd">
      <div class="tag"><span class="live-dot" id="liveDot"></span>HAL&gt;</div>
      <input id="q" placeholder="sync imports · explain this widget · go to claims desk" autocomplete="off" />
      <div class="status" id="cmdStatus">TERMINAL · booting…</div>
      <button type="submit" id="execBtn">EXEC</button>
    </form>
  </div>
  <div class="toast" id="toast"></div>
  <script src="/terminal-desk.js?v=hal-10629-multi2"></script>
</body>
</html>
