name: Secret Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.67.3
        with:
          scanArguments: --exclude-path .trufflehogignore .
