<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f2233" />
    <title>New Ridge Financial Browser App</title>
    <script>
      // Inline kill-switch: index.html is served no-store, so this always runs
      // fresh from the network even if a stale service worker is controlling the
      // page. It unregisters any old workers, clears every cache, and reloads
      // exactly once so the page breaks free of a cached "old schema" shell.
      (function () {
        try {
          var hadController = !!(navigator.serviceWorker && navigator.serviceWorker.controller);
          var tasks = [];
          if ("serviceWorker" in navigator) {
            tasks.push(
              navigator.serviceWorker
                .getRegistrations()
                .then(function (regs) {
                  return Promise.all(regs.map(function (r) { return r.unregister(); }));
                })
                .catch(function () {})
            );
          }
          if (window.caches && caches.keys) {
            tasks.push(
              caches
                .keys()
                .then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                })
                .catch(function () {})
            );
          }
          if (hadController && !sessionStorage.getItem("nr-sw-reset")) {
            Promise.all(tasks).then(function () {
              sessionStorage.setItem("nr-sw-reset", "1");
              window.location.reload();
            });
          }
        } catch (e) {
          /* no-op: never block app startup on cache cleanup */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
